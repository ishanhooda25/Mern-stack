<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working cube</title>
    <link rel="stylesheet" href="4.2 Cube.css">
</head>
<body>
    <div id="main">
        <div id="cube">
            <div class="face" id="front">
                <img src="images/F.jpg">
            </div>
            <div class="face" id="right">
                <img src="images/IJ.JPG" alt="">
            </div>
            <div class="face" id="left">
                <img src="images/M.jpg" alt="">
            </div>
            <div class="face" id="up">
                <img src="images/P.jpg" alt="">
            </div>
            <div class="face" id="down">
                <img src="images/PC.jpg" alt="">
            </div>
            <div class="face" id="back">
                <img src="images/PS.jpg" alt="">
            </div>
        </div>
    </div>
</body>
</html>
